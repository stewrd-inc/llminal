  level: 1
  token_cost_gpt4: 1
  token_cost_mistral: 2

- abbreviated: srch
  expanded: search
  category: verb
  level: 1
  token_cost_gpt4: 2  # note: srch costs MORE than "search" in GPT-4
  token_cost_mistral: 2

