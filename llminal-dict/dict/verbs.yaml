# Verb abbreviations
# These replace common action verbs in LLMinal L1+ messages.
# Token note: most abbreviations are token-neutral in modern tokenizers
# (review=1tok, rv=1tok). The savings come from DELETION of filler words,
# not from abbreviation. Abbreviations improve readability, not token count.
# However, they DO save tokens in Mistral/SentencePiece where common
# English words may be 2 tokens but short abbreviations are 1-2 tokens.

- abbreviated: rv
  expanded: review
  category: verb
  level: 1
  token_cost_gpt4: 1
  token_cost_mistral: 2

- abbreviated: impl
  expanded: implement
  category: verb
  level: 1
  token_cost_gpt4: 1
  token_cost_mistral: 2

